services:

  db:
    image: postgres:18.2
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    ports:
      - '5432:5432'
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
      POSTGRES_DB: pomodoro

  cache:
    image: redis:8.6.3-alpine
    restart: always
    ports:
      - '6379:6379'
